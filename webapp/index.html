<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>U.S. Demographics Explorer</title>
<style>
  :root{
    --bg:#0f172a;--panel:#ffffff;--ink:#0f172a;--muted:#64748b;
    --line:#e2e8f0;--accent:#2563eb;
    --private:#2563eb;--public:#7c3aed;--unins:#ef4444;--inc:#0ea5e9;--div:#10b981;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#f1f5f9}
  header{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;padding:26px 20px 30px}
  .wrap{max-width:1040px;margin:0 auto;padding:0 16px}
  h1{margin:0 0 4px;font-size:22px;font-weight:700}
  .sub{color:#cbd5e1;font-size:13px}
  .searchbox{position:relative;margin-top:18px}
  #q{width:100%;padding:15px 16px 15px 44px;font-size:17px;border:0;border-radius:12px;box-shadow:var(--shadow);outline:none}
  .mag{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:18px}
  #results{position:absolute;left:0;right:0;top:58px;background:#fff;border-radius:12px;box-shadow:var(--shadow);max-height:60vh;overflow:auto;z-index:30;display:none}
  .res{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
  .res:last-child{border-bottom:0}
  .res.active,.res:hover{background:#eff6ff}
  .res .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;color:#fff;flex:none}
  .b-Nation{background:#0f172a}.b-State{background:#2563eb}.b-County{background:#0891b2}.b-Place{background:#10b981}
  .controls{margin-top:14px;display:flex;gap:14px;align-items:center;color:#cbd5e1;font-size:13px}
  .controls.hidden{display:none}
  #year{font-size:14px;padding:7px 10px;border-radius:8px;border:0;font-weight:600}
  main{max-width:1040px;margin:22px auto 60px;padding:0 16px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .big{font-size:46px;margin-bottom:8px}
  .dtoolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;box-shadow:var(--shadow)}
  .btn:hover{background:#f8fafc}
  .chip{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:6px 12px;box-shadow:var(--shadow)}
  .chip .x{cursor:pointer;color:#94a3b8;font-weight:800;border:0;background:none;font-size:15px}
  .cols{display:grid;grid-template-columns:1fr;gap:18px}
  .cols.two{grid-template-columns:1fr 1fr}
  @media(max-width:820px){.cols.two{grid-template-columns:1fr}}
  .cols.two .grid{grid-template-columns:1fr}
  .geopanel{min-width:0}
  .head{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;margin-bottom:4px}
  .head h2{margin:0;font-size:23px}
  .popline{color:var(--muted);margin-bottom:16px}
  .popline b{color:var(--ink);font-size:19px}
  .trend{font-size:12.5px;font-weight:700;margin-left:6px}
  .up{color:#16a34a}.down{color:#dc2626}.flat{color:#64748b}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border-radius:14px;padding:16px 16px 18px;box-shadow:var(--shadow);margin-bottom:16px}
  .card h3{margin:0 0 2px;font-size:14px}
  .card .note{color:var(--muted);font-size:12px;margin:0 0 12px}
  .bar{display:grid;grid-template-columns:140px 1fr 48px;align-items:center;gap:8px;margin:5px 0}
  .bar .lab{font-size:12px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{background:#f1f5f9;border-radius:6px;height:15px;overflow:hidden}
  .fill{height:100%;border-radius:6px}
  .pct{font-size:12px;text-align:right;color:#334155;font-variant-numeric:tabular-nums}
  .ins-groups{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .stat{border-radius:12px;padding:12px;color:#fff;text-align:center}
  .stat .v{font-size:22px;font-weight:800;line-height:1}
  .stat .k{font-size:11px;opacity:.92;margin-top:4px}
  .foot{color:var(--muted);font-size:12px;margin-top:18px;text-align:center}
  kbd{background:#e2e8f0;border-radius:4px;padding:1px 6px;font-size:11px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>U.S. Demographics Explorer</h1>
    <div class="sub" id="subtitle">Loading data…</div>
    <div class="searchbox">
      <span class="mag">&#128269;</span>
      <input id="q" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search any city, county, state, or the nation…">
      <div id="results"></div>
    </div>
    <div class="controls hidden" id="controls">
      <label>Year&nbsp; <select id="year"></select></label>
    </div>
  </div>
</header>

<main>
  <div id="panel">
    <div class="empty">
      <div class="big">&#127757;</div>
      <div>Search for a place above to see its demographic profile.</div>
      <div style="margin-top:8px;font-size:13px">
        Try <b>Boulder city, Colorado</b>, <b>Cook County</b>, <b>Texas</b>, or <b>United States</b>.
        Use <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>Enter</kbd>, switch the <b>Year</b>, or add a second place to <b>compare</b>.
      </div>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
