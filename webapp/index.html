<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>U.S. Demographics Explorer</title>
<style>
  :root{
    --bg:#0f172a; --panel:#ffffff; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --accent:#2563eb; --accent2:#0ea5e9;
    --private:#2563eb; --public:#7c3aed; --unins:#ef4444;
    --inc:#0ea5e9; --div:#10b981;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:#f1f5f9}
  header{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;padding:26px 20px 30px}
  .wrap{max-width:980px;margin:0 auto;padding:0 16px}
  h1{margin:0 0 4px;font-size:22px;font-weight:700;letter-spacing:.2px}
  .sub{color:#cbd5e1;font-size:13px}
  .searchbox{position:relative;margin-top:18px}
  #q{width:100%;padding:15px 16px 15px 44px;font-size:17px;border:0;border-radius:12px;
     box-shadow:var(--shadow);outline:none}
  .mag{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:18px}
  #results{position:absolute;left:0;right:0;top:58px;background:#fff;border-radius:12px;
           box-shadow:var(--shadow);max-height:60vh;overflow:auto;z-index:30;display:none}
  .res{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
  .res:last-child{border-bottom:0}
  .res.active,.res:hover{background:#eff6ff}
  .res .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;color:#fff;flex:none}
  .b-Nation{background:#0f172a}.b-State{background:#2563eb}.b-County{background:#0891b2}.b-Place{background:#10b981}
  .hint{padding:14px;color:var(--muted);font-size:13px}
  main{max-width:980px;margin:22px auto 60px;padding:0 16px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .big{font-size:46px;margin-bottom:8px}
  .head{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;margin-bottom:4px}
  .head h2{margin:0;font-size:26px}
  .head .lvl{font-size:12px}
  .popline{color:var(--muted);margin-bottom:18px}
  .popline b{color:var(--ink);font-size:20px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border-radius:14px;padding:18px 18px 20px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 2px;font-size:15px}
  .card .note{color:var(--muted);font-size:12px;margin:0 0 14px}
  .bar{display:grid;grid-template-columns:150px 1fr 52px;align-items:center;gap:10px;margin:6px 0}
  .bar .lab{font-size:12.5px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{background:#f1f5f9;border-radius:6px;height:16px;overflow:hidden}
  .fill{height:100%;border-radius:6px}
  .pct{font-size:12.5px;text-align:right;color:#334155;font-variant-numeric:tabular-nums}
  .ins-groups{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .stat{border-radius:12px;padding:14px;color:#fff;text-align:center}
  .stat .v{font-size:26px;font-weight:800;line-height:1}
  .stat .k{font-size:12px;opacity:.92;margin-top:4px}
  .foot{color:var(--muted);font-size:12px;margin-top:22px;text-align:center}
  a{color:var(--accent)}
  kbd{background:#e2e8f0;border-radius:4px;padding:1px 6px;font-size:11px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>U.S. Demographics Explorer</h1>
    <div class="sub" id="subtitle">Loading data…</div>
    <div class="searchbox">
      <span class="mag">&#128269;</span>
      <input id="q" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search any city, county, state, or the nation…">
      <div id="results"></div>
    </div>
  </div>
</header>

<main>
  <div id="panel">
    <div class="empty">
      <div class="big">&#127757;</div>
      <div>Search for a place above to see its demographic profile.</div>
      <div style="margin-top:8px;font-size:13px">
        Try <b>Boulder city, Colorado</b>, <b>Cook County</b>, <b>Texas</b>, or <b>United States</b>.
        Use <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>Enter</kbd>.
      </div>
    </div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
let INDEX=[], META={}, ACTIVE=-1, CUR=[];
const shardCache={};

function fipsShard(r){ return (r.level==='Nation'||r.level==='State') ? 'us' : r.state; }

async function boot(){
  try{
    META = await (await fetch('data/meta.json')).json();
    INDEX = await (await fetch('data/index.json')).json();
    for(const r of INDEX) r._l = r.name.toLowerCase();
    const c=META.counts||{};
    $('#subtitle').innerHTML =
      `Census ACS 5-year ${META.year} &middot; ${ (META.total||INDEX.length).toLocaleString() } geographies `
      + `(${(c.Place||0).toLocaleString()} cities, ${(c.County||0).toLocaleString()} counties, ${c.State||0} states)`;
    $('#q').focus();
  }catch(e){
    $('#subtitle').textContent='Could not load data. Run "py census_bulk.py" then "py serve.py".';
  }
}

function search(term){
  term=term.trim().toLowerCase();
  if(!term){ CUR=[]; return render([]); }
  const out=[]; const starts=[]; const has=[];
  for(const r of INDEX){
    const i=r._l.indexOf(term);
    if(i===0) starts.push(r); else if(i>0) has.push(r);
    if(starts.length>=60) break;
  }
  // rank: prefix matches first, then contains; bigger geos first within
  const rankLvl={Nation:0,State:1,County:2,Place:3};
  const cmp=(a,b)=>(rankLvl[a.level]-rankLvl[b.level])||a.name.length-b.name.length;
  CUR = starts.sort(cmp).concat(has.sort(cmp)).slice(0,50);
  render(CUR);
}

function render(list){
  const box=$('#results'); ACTIVE=-1;
  if(!list.length){ box.style.display='none'; box.innerHTML=''; return; }
  box.innerHTML = list.map((r,i)=>
    `<div class="res" data-i="${i}">
       <span class="badge b-${r.level}">${r.level==='Place'?'City':r.level}</span>
       <span class="nm">${r.name}</span>
     </div>`).join('');
  box.style.display='block';
  box.querySelectorAll('.res').forEach(el=>{
    el.onclick=()=>choose(list[+el.dataset.i]);
  });
}

function move(d){
  const els=$('#results').querySelectorAll('.res'); if(!els.length)return;
  ACTIVE=(ACTIVE+d+els.length)%els.length;
  els.forEach((e,i)=>e.classList.toggle('active',i===ACTIVE));
  els[ACTIVE].scrollIntoView({block:'nearest'});
}

async function choose(r){
  $('#q').value=r.name; $('#results').style.display='none';
  const shard=fipsShard(r);
  if(!shardCache[shard]){
    $('#panel').innerHTML='<div class="empty"><div class="big">&#8987;</div>Loading…</div>';
    try{ shardCache[shard]=await (await fetch(`data/profiles/${shard}.json`)).json(); }
    catch(e){ shardCache[shard]={}; }
  }
  const prof=shardCache[shard][r.id];
  if(!prof){ $('#panel').innerHTML='<div class="empty">No profile for this place.</div>'; return; }
  draw(r,prof);
}

function barRows(items, color, maxOverride){
  const max=maxOverride||Math.max(...items.map(d=>d[1]),1);
  return items.map(([lab,pct])=>{
    const w=Math.max(1, pct/max*100);
    return `<div class="bar"><span class="lab" title="${lab}">${lab}</span>
      <span class="track"><span class="fill" style="width:${w}%;background:${color}"></span></span>
      <span class="pct">${pct.toFixed(1)}%</span></div>`;
  }).join('');
}

function draw(r,p){
  const g=Object.fromEntries(p.insurance.groups);
  const stat=(k,v,c)=>`<div class="stat" style="background:${c}"><div class="v">${v==null?'–':v.toFixed(1)+'%'}</div><div class="k">${k}</div></div>`;
  $('#panel').innerHTML=`
    <div class="head">
      <h2>${r.name}</h2>
      <span class="badge b-${r.level} lvl">${r.level==='Place'?'City / Town':r.level}</span>
    </div>
    <div class="popline">Population: <b>${p.pop?p.pop.toLocaleString():'–'}</b>
       <span style="color:#94a3b8">&middot; ACS 5-year ${META.year}</span></div>
    <div class="grid">
      <div class="card">
        <h3>Diversity</h3>
        <p class="note">Share of population. Hispanic shown as one group; all others are non-Hispanic.</p>
        ${barRows(p.diversity,'var(--div)')}
      </div>
      <div class="card">
        <h3>Household income</h3>
        <p class="note">Share of households in each income bracket.</p>
        ${barRows(p.income,'var(--inc)')}
      </div>
      <div class="card" style="grid-column:1/-1">
        <h3>Health insurance coverage</h3>
        <p class="note">Uninsured is an exclusive share. Private &amp; public overlap (a person can have both), so type bars need not sum to 100%.</p>
        <div class="ins-groups">
          ${stat('Private',g['Private'],'var(--private)')}
          ${stat('Public',g['Public'],'var(--public)')}
          ${stat('Uninsured',g['Uninsured'],'var(--unins)')}
        </div>
        ${barRows(p.insurance.types,'#64748b',Math.max(...p.insurance.types.map(d=>d[1]),1))}
      </div>
    </div>
    <div class="foot">Source: U.S. Census Bureau, American Community Survey 5-year estimates (${META.year}).</div>`;
}

$('#q').addEventListener('input',e=>search(e.target.value));
$('#q').addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();move(1);}
  else if(e.key==='ArrowUp'){e.preventDefault();move(-1);}
  else if(e.key==='Enter'){ if(CUR.length){ choose(CUR[ACTIVE>=0?ACTIVE:0]); } }
  else if(e.key==='Escape'){ $('#results').style.display='none'; }
});
document.addEventListener('click',e=>{ if(!e.target.closest('.searchbox')) $('#results').style.display='none'; });
boot();
</script>
</body>
</html>
