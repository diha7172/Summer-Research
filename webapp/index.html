<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>U.S. Demographics Explorer</title>
<style>
  :root{
    --ink:#0f172a;--muted:#64748b;--line:#e7ebf3;--accent:#6366f1;
    --private:#2563eb;--public:#7c3aed;--unins:#ef4444;--inc:#0ea5e9;--div:#10b981;--age:#6366f1;
    --shadow:0 1px 2px rgba(15,23,42,.06),0 10px 30px rgba(15,23,42,.07);
    --shadow-lg:0 20px 60px rgba(15,23,42,.16);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;color:var(--ink);background:
       radial-gradient(1200px 500px at 80% -100px,#e9efff 0,rgba(233,239,255,0) 60%),
       radial-gradient(900px 500px at -10% 0,#eafff6 0,rgba(234,255,246,0) 55%),#f6f8fc;
       font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}

  /* ---------- header ---------- */
  header{position:relative;overflow:hidden;color:#fff;padding:30px 20px 34px;
    background:linear-gradient(120deg,#0b1233,#1e1b4b,#312e81,#1e3a8a,#075985);
    background-size:300% 300%;animation:grad 18s ease infinite}
  header::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(700px 220px at 85% -40px,rgba(99,102,241,.45),transparent 60%)}
  @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .wrap{max-width:1060px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  h1{margin:0 0 4px;font-size:25px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
  h1 .dot{font-size:24px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))}
  .sub{color:#c7d2fe;font-size:13px}

  .searchbox{position:relative;margin-top:20px}
  #q{width:100%;padding:17px 18px 17px 50px;font-size:17px;border:0;border-radius:16px;color:#0f172a;
     background:rgba(255,255,255,.97);box-shadow:0 8px 30px rgba(2,6,23,.25);outline:none;
     transition:box-shadow .25s,transform .25s}
  #q::placeholder{color:#94a3b8}
  #q:focus{transform:translateY(-1px);box-shadow:0 0 0 4px rgba(99,102,241,.45),0 14px 40px rgba(2,6,23,.3)}
  .mag{position:absolute;left:17px;top:50%;transform:translateY(-50%);font-size:19px;opacity:.85}
  #results{position:absolute;left:0;right:0;top:64px;background:#fff;color:#0f172a;border-radius:16px;
    box-shadow:var(--shadow-lg);max-height:62vh;overflow:auto;z-index:30;display:none;
    animation:drop .16s ease;border:1px solid var(--line)}
  @keyframes drop{from{opacity:0;transform:translateY(-6px)}}
  .res{display:flex;align-items:center;gap:11px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;
    transition:background .12s,padding-left .12s}
  .res:last-child{border-bottom:0}
  .res.active,.res:hover{background:#eef2ff;padding-left:20px}
  .res .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .badge{font-size:10.5px;font-weight:800;letter-spacing:.3px;padding:3px 9px;border-radius:999px;color:#fff;flex:none;text-transform:uppercase}
  .b-Nation{background:#0f172a}.b-State{background:#2563eb}.b-County{background:#0891b2}.b-Place{background:#10b981}

  .controls{margin-top:16px;display:flex;gap:14px;align-items:center;color:#c7d2fe;font-size:13px;
    opacity:0;transform:translateY(4px);transition:opacity .4s,transform .4s}
  .controls.show{opacity:1;transform:none}
  #year{font:600 14px inherit;padding:8px 12px;border-radius:10px;border:0;background:#fff;color:#0f172a;cursor:pointer;
    box-shadow:0 4px 14px rgba(2,6,23,.18)}

  /* ---------- main ---------- */
  main{max-width:1060px;margin:24px auto 70px;padding:0 16px}

  /* hero / empty state */
  .empty{text-align:center;padding:48px 16px 30px;animation:rise .5s ease both}
  .hero-badge{font-size:58px;display:inline-block;animation:floaty 4.5s ease-in-out infinite;
    filter:drop-shadow(0 12px 24px rgba(99,102,241,.35))}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
  .hero-title{margin:14px 0 6px;font-size:30px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(90deg,#1e3a8a,#6366f1,#0ea5e9);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero-sub{color:var(--muted);max-width:560px;margin:0 auto 18px;font-size:15px}
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
  .exchip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 16px;font-size:14px;font-weight:600;
    color:#334155;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s,color .15s}
  .exchip:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(99,102,241,.22);color:var(--accent)}
  .hero-hint{color:#94a3b8;font-size:13px;margin-top:6px}

  /* dashboard */
  .dtoolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;animation:rise .4s ease both}
  .btn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(99,102,241,.2);color:var(--accent)}
  .chip{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:7px 14px;box-shadow:var(--shadow);font-weight:600}
  .chip .x{cursor:pointer;color:#94a3b8;font-weight:800;border:0;background:none;font-size:16px;line-height:1}
  .chip .x:hover{color:var(--unins)}

  .cols{display:grid;grid-template-columns:1fr;gap:20px}
  .cols.two{grid-template-columns:1fr 1fr}
  @media(max-width:860px){.cols.two{grid-template-columns:1fr}}
  .cols.two .grid{grid-template-columns:1fr}
  .geopanel{min-width:0;animation:rise .45s ease both}
  .head{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;margin-bottom:4px}
  .head h2{margin:0;font-size:25px;font-weight:800;letter-spacing:-.3px}
  .popline{color:var(--muted);margin-bottom:16px}
  .popline b{color:var(--ink);font-size:20px;font-weight:800}
  .trend{font-size:12.5px;font-weight:800;margin-left:6px}
  .up{color:#16a34a}.down{color:#dc2626}.flat{color:#64748b}

  .fbnote{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:12px;padding:10px 14px;font-size:12.5px;margin-bottom:14px}
  .mapwrap{border-radius:16px;overflow:hidden;border:1px solid var(--line);height:clamp(320px,52vh,520px);
    background:#eef2f7;box-shadow:var(--shadow);margin-bottom:18px;animation:rise .5s ease both}
  .mapwrap iframe{width:100%;height:100%;border:0;display:block}

  .keystats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  .kpi{flex:1 1 132px;background:#fff;border-radius:14px;padding:13px 16px;box-shadow:var(--shadow);
    border:1px solid var(--line);animation:rise .5s ease both;transition:transform .15s,box-shadow .15s}
  .kpi:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(15,23,42,.1)}
  .kpi .v{font-size:20px;font-weight:800;color:#0f172a;letter-spacing:-.3px}
  .kpi .k{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .card{background:#fff;border-radius:16px;padding:18px 18px 20px;box-shadow:var(--shadow);border:1px solid var(--line);
    margin-bottom:18px;animation:rise .5s ease both;transition:transform .18s,box-shadow .18s}
  .card:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(15,23,42,.1)}
  .card h3{margin:0 0 2px;font-size:15px;font-weight:800;letter-spacing:-.2px}
  .card .note{color:var(--muted);font-size:12px;margin:0 0 14px}
  .bar{display:grid;grid-template-columns:148px 1fr 50px;align-items:center;gap:10px;margin:7px 0}
  .bar .lab{font-size:12.5px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{background:#f1f5f9;border-radius:7px;height:17px;overflow:hidden}
  .fill{height:100%;width:var(--w);border-radius:7px;animation:grow 1s cubic-bezier(.2,.85,.25,1) both}
  @keyframes grow{from{width:0}}
  .pct{font-size:12.5px;text-align:right;color:#0f172a;font-weight:700;font-variant-numeric:tabular-nums}
  .ins-groups{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .stat{border-radius:14px;padding:14px;color:#fff;text-align:center;animation:pop .5s cubic-bezier(.2,1.2,.3,1) both;
    box-shadow:0 8px 20px rgba(15,23,42,.12)}
  @keyframes pop{from{opacity:0;transform:scale(.85)}}
  .stat .v{font-size:24px;font-weight:800;line-height:1}
  .stat .k{font-size:11px;opacity:.95;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}

  .foot{color:var(--muted);font-size:12px;margin-top:20px;text-align:center}
  a{color:var(--accent);font-weight:600;text-decoration:none}
  a:hover{text-decoration:underline}
  kbd{background:rgba(255,255,255,.18);border-radius:5px;padding:2px 7px;font-size:11px;font-family:inherit}
  .hero-hint kbd{background:#eef2f7;color:#475569}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1><span class="dot">&#128205;</span> U.S. Demographics Explorer</h1>
    <div class="sub" id="subtitle">Loading data&hellip;</div>
    <div class="searchbox">
      <span class="mag">&#128269;</span>
      <input id="q" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search any city, county, state, or the nation&hellip;">
      <div id="results"></div>
    </div>
    <div class="controls" id="controls">
      <label>Year&nbsp; <select id="year"></select></label>
    </div>
  </div>
</header>

<main>
  <div id="panel">
    <div class="empty">
      <div class="hero-badge">&#127758;</div>
      <h2 class="hero-title">Explore America, place by place</h2>
      <p class="hero-sub">Population, age, race, income, health insurance and more for every U.S.
        city, county and state &mdash; with a map and a decade of change (2013&ndash;2024).</p>
      <div class="chips">
        <button class="exchip" data-q="United States">United States</button>
        <button class="exchip" data-q="Texas">Texas</button>
        <button class="exchip" data-q="Cook County, Illinois">Cook County, IL</button>
        <button class="exchip" data-q="Los Angeles city, California">Los Angeles</button>
        <button class="exchip" data-q="Boulder city, Colorado">Boulder, CO</button>
      </div>
      <p class="hero-hint">or search any of <b>35,000+</b> places above &middot;
        <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&crarr;</kbd></p>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
